<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login responsiva com HTML e CSS</title>
    <link rel="stylesheet" href="estilos/style.css"> <!--Formatação padrão-->
    <link rel="stylesheet" href="estilos/styleall.css"> <!--Formatação all dispositivos-->
</head>
<body>
    <main>
        <section id="login">

            <div id="imagem"></div>

            <div id="form">

                <h1>login</h1>

                <p class="paragrafo">Seja bem-vindo novamente, Faça loginpara acessar sua conta</p><br>

                <form action="login.php" method="post" autocomplete="off">

                    <p  class="log">
                        <input type="text" name="usu" id="iusu" autocomplete="off" maxlength="20">
                        <label for="iusu">Usuário</label>
                    </p>

                    <p class="senha">
                        <input type="password" name="senha" id="isenha" autocomplete="off" maxlength="20" minlength="8">
                        <label for="isenha">Senha</label>
                    </p>

                    <p class="botao">
                        <input type="submit" value="Entrar" class="botaoenviar"><br>
                        <a href="#" class="recuperarsenha">Esqueci a senha?</a>
                    </p>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
