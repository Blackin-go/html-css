<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario tres</title>
</head>
<body>
    <form action="test.html" method="post" autocomplete="on">

        <p>
            <label for="iusu">Usuário:</label>
        <input type="text" name="usu" id="iusu" autocomplete="username"required placeholder="nome de usuario">    
        </p>

        <p>
            <label for="iusu">Senha:</label>
        <input type="password" name="usu" id="iusu" autocomplete="current-password" required placeholder="senha do usuario"> 
        </p>
        
        <p>
            <label for="ialu">Aluno:</label>
            <input type="text" name="alu" id="ialu" required minlength="5">
        </p>

        <p>
            <label for="ano">Ano de formação:</label>
            <input type="month" name="ano" id="iano" value="2020-07">
        </p>

        <p>
            <label for="idia">Dia da prova:</label>
            <input type="date" name="dia" id="idia">
        </p>

        <p>
            <label for="inot">Nota:</label>
            <input type="number" name="not" id="inot" step="0.1" max="10" required min="0" value="5">
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

        
    </form>
</body>
</html>
