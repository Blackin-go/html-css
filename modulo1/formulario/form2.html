<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1>teste de formulario</h1>

    <form action="test.html" method="post" autocomplete="off">
    <p>
        <label for="usu">Usuário:</label>
        <input type="text" name="usu" id="iusu" required minlength="7" max="12" size="10" placeholder="Nome do usuario" autocomplete="username">
    </p>

    <p>
        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="isenha" required minlength="6" maxlength="10" size="10" placeholder="senha do usuario" autocomplete="current-password">
    </p>

    <p><input type="submit" value="Acessar">
        <input type="reset" value="Limpar">
    </p>

    </form>
</body>
</html>
