<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Froemulario 5</title>
</head>
<body>
    <h1>Telefones e emails</h1>

    <form action="" method="post">
        <fieldset>
            <legend >Dados pessoais</legend>
            <div style="padding: 10px 60px 12px 12px ;">
                <label for="iemail" >Email:</label>
                <input type="email" name="email" id="iemail" autocomplete="email" placeholder="email do usuario" >
            </div>
            <div>
                <label for="itel">Telefone:</label>
                <input type="tel" name="tel" id="itel" autocomplete="tel-national" required placeholder="(xx)(xxxxxxxxx)" pattern="^\d{4,5}-\d{4}S" >
                <!--Estudar mais sobre RegEx-->
            </div>
            <div>
                <label for="isenha">Senha:</label>
                <input type="email" name="senha" id="isenha">
            </div>
            <div>
                <input type="submit" value="Enviar"><br>
                <input type="reset" value="Limpar">
            </div>
        </fieldset>
    </form>
</body>
</html>
