<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="test.html" method="post" autocomplete="on">

        <p>
            <label for="iesta">Estado</label>
            <select name="estado" id="iesta">

                <optgroup label="Região Sul">
                    <option value="MG">Minas Gerais</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="SP">São Paulo</option>
                </optgroup>

                <optgroup label="Região Centro Oeste">
                    <option value="BR">Brasilia</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="BH">Banhia</option>
                </optgroup>

            </select>
        </p>

        <label for="iprof">Profissão: </label>
        <input type="text" name="prof" id="iprof" list="lstprof">

        <datalist id="lstprof">
            <option value="PROF">Professor</option>
            <option value="MEC">Mecânico</option>
            <option value="ADM">Administração</option>
            <option value="ATE">Atendente</option>
            <option value="TRA">Traficante</option>

        </datalist>

        <label for="imsg">Mensagem</label><br>
        <textarea name="msg" id="imsg" cols="30" rows="10" placeholder="Deixe tua mensagem"></textarea>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
