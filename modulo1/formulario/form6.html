<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1>Elementos color, range e file</h1>

    <form action="test.html" method="post" autocomplete="on">
        <fieldset>
            <legend>Cores, range e file</legend>

            <label for="icor">cor</label>
            <input type="color" name="cor" id="icor" value="#00f000">
            <br>

            <label for="inivel">Nivel de satisfação</label>
            <input type="range" name="nivel" id="inivel" min="2" max="10" value="3">
            <br>

            <label for="ifoto">Foto</label>
            <input type="file" name="foto" id="ifoto">
            
        </fieldset>
        <div>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</body>
</html>
