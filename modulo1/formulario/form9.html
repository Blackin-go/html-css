<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="test.html" method="get" autocomplete="on">

        <p>
            <label for="inu">Valor</label>
            <input type="range" name="nu" id="inu" min="0" max="10" value="5" 
            oninput="ival.ineerHTML=Number(inu.value)">
            <output id="ival">5</output>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

        <p>
            <label for="inum">Número :</label>
            <input type="range" name="num" id="inum"
            min="0" max="10" value="5" oninput="ival.innerHTML=Number(inum.value)">
            <output id="ival">5</output>
        </p>
    </form>
</body>
</html>
