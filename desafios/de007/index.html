<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>
</head>
<body>

    <h1>Imagens flexíveis</h1>
    <p>Usamos a tag PICTURE para informar sobre a midia e SOURCE adicionar as váriaveis que ficam dentro de src e a principal dentro de IMG</p>

    <picture>

        <source media="(max-width: 500px)" srcset="imagens/image400.png" type="image/png">

        <source media="(max-width: 800px)" srcset="imagens/1000.png" type="image/png">

        <img src="imagens/1300.png" alt="">
        
    </picture>

    
</body>
</html>
