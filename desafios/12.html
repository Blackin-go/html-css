<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 13</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
        }

        table#tabela1 {
            text-align: center;
        }

        td {
            background-color: aquamarine;
            border: 1px solid black;
            width: 50px;

        }

        td.destaque {
            background-color: #7c7c7c;
            color: white;
        }
        
    </style>
</head>
<body>
    <table id="tabela1">
        <tr>
            <td>1</td>
            <td>2</td>
            <td rowspan="2" class="destaque">3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
        </tr>
        <tr>
            <td colspan="3" class="destaque">8</td>
            <td>9</td>
        </tr>
        <tr>
            <td rowspan="2" class="destaque">10</td>
            <td colspan="2" class="destaque">11</td>
            <td>12</td>
        </tr>
        <tr>
            <td>13</td>
            <td>14</td>
            <td>15</td>
        </tr>
    </table>
</body>
</html>
